<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>World Cup 2026 Tracker</title>

    <link rel="stylesheet"
          href="style.css">
    
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>

<body>

<div id="last-updated"></div>
<h1>FIFA World Cup 2026 </h1>


<section>
    <h2>Today's Matches</h2>
    <div id="today-matches"></div>
</section>

<section>
    <h2>Upcoming Matches</h2>

    <div id="upcoming-matches"></div>

    <p>
        <a
          href="https://www.fifa.com/en/tournaments/mens/worldcup/canadamexicousa2026/scores-fixtures?country=&wtw-filter=ALL"
          target="_blank">
          See full fixture →
        </a>
    </p>
</section>

<section>

  <details>

    <summary>
      Groups
    </summary>

    <div id="groups"></div>

  </details>

</section>

<section>

    <div class="bracket-header">

        <h2>Knockout Bracket</h2>

        <div id="zoom-controls">

            <button id="zoom-in">+</button>

            <span id="zoom-level">100%</span>

            <button id="zoom-out">−</button>

            <button id="zoom-reset">Reset</button>

        </div>

    </div>

    <div id="bracket-wrapper">

        <div id="zoom-layer">

            <svg id="bracket-lines"></svg>

            <div id="bracket"></div>

        </div>

    </div>

</section>

<script src="app.js"></script>

</body>
</html>

name: Update World Cup Data

on:
  schedule:
  # Every hour outside match-heavy periods
  - cron: "0 7-16 * * *"

  # Every 10 minutes during World Cup viewing hours
  - cron: "*/10 17-23,0-6 * * *"

  # Guaranteed 12:30 AM Bangladesh refresh
  - cron: "30 18 * * *"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          pip install requests
          pip install python-dotenv

      - name: Run Updater
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python scripts/update.py

      - name: Commit Changes

        run: |
          git config user.name "World Cup Bot"
          git config user.email "actions@github.com"

          git add data/*.json

          git diff --staged --quiet || git commit -m "Update World Cup data"

          git push
